<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern ID Card Template</title>
    <link rel="stylesheet" href="./id2.css">
</head>
<body>

    <div class="template-container">
        
        <div class="id-card front">
            <div class="top-bg"></div>
            
            <div class="card-content">
                <div class="photo-container-circle">
                    <img src="https://www.shutterstock.com/image-photo/portrait-young-asian-business-man-260nw-2587172353.jpg" alt="John Smith">
                </div>

                <h2 class="user-name">JOHN SMITH</h2>
                <p class="user-title">creative manager</p>
                
                <div class="divider"></div>

                <div class="company-branding">
                    <div class="logo-icon">
                        <div class="inner-wave"></div>
                    </div>
                    <div class="logo-text">
                        <h3>COMPANY</h3>
                        <p>TAGLINE HERE</p>
                    </div>
                </div>
            </div>

            <div class="bottom-bg"></div>
        </div>

        <div class="id-card back">
            <div class="top-bg"></div>

            <div class="card-content back-content">
                <div class="company-branding top-brand">
                    <div class="logo-icon">
                        <div class="inner-wave"></div>
                    </div>
                    <div class="logo-text">
                        <h3>COMPANY</h3>
                        <p>TAGLINE HERE</p>
                    </div>
                </div>

                <table class="info-table">
                    <tr>
                        <td class="label">ID NO</td>
                        <td class="colon">:</td>
                        <td class="value">098276656</td>
                    </tr>
                    <tr>
                        <td class="label">Blood</td>
                        <td class="colon">:</td>
                        <td class="value">A-</td>
                    </tr>
                    <tr>
                        <td class="label">Phone</td>
                        <td class="colon">:</td>
                        <td class="value">000-123-456-786</td>
                    </tr>
                    <tr>
                        <td class="label">E-mail</td>
                        <td class="colon">:</td>
                        <td class="value">umail@gmail.com</td>
                    </tr>
                </table>

                <div class="barcode-container">
                    <div class="barcode-lines"></div>
                </div>
            </div>
        </div>

    </div>
</body>
</html
