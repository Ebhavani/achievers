<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Placements</title>

<style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
    }

    body{
        background-color:#000;
        color:white;
        font-family: Arial, sans-serif;
        display:flex;
        justify-content:center;
        align-items:center;
        height:100vh;
        text-align:center;
    }

    .container{
        max-width:1000px;
        padding:20px;
    }

    h1{
        color:#ffd700;
        font-size:55px;
        font-style:italic;
        font-weight:bold;
        margin-bottom:20px;
        text-shadow:2px 2px 5px rgba(255,215,0,0.5);
    }

    p{
        font-size:28px;
        font-weight:bold;
        line-height:1.4;
        margin-bottom:30px;
    }

    .btn{
        display:inline-block;
        padding:15px 35px;
        background:#fff;
        color:#d4a000;
        text-decoration:none;
        font-size:22px;
        border-radius:8px;
        font-weight:bold;
        border:2px solid #ffd700;
        transition:0.3s;
    }

    .btn:hover{
        background:#ffd700;
        color:#000;
    }
</style>
</head>
<body>

<div class="container">
    <h1>23 Students Got Jobs in the Last 4 Months</h1>

    <p>
        Cracked interviews independently with strong fundamentals,
        real-time skills, and confidence – no proxies, no shortcuts,
        no external help.
    </p>

    <a href="#" class="btn">Got 1k+ Reviews</a>
</div>

</body>
</html>
