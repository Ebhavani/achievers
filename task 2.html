<!DOCTYPE html>
<html>
<head>
    <title>Colspan and Rowspan Table</title>
    <style>
        table{
            border-collapse: collapse;
            margin: auto;
        }
        td{
            border: 1px solid black;
            width: 50px;
            height: 50px;
            text-align: center;
            font-weight: bold;
        }
    </style>
</head>
<body>

<table>
    <tr>
        <td rowspan="8">A</td>
        <td rowspan="7">B</td>
        <td rowspan="6">C</td>
        <td rowspan="5">D</td>
        <td rowspan="4">E</td>
        <td rowspan="3">F</td>
        <td>AH</td>
        <td rowspan="3">I</td>
        <td rowspan="4">J</td>
        <td rowspan="5">K</td>
        <td rowspan="6">L</td>
        <td rowspan="7">M</td>
    </tr>

    <tr>
        <td>H</td>
    </tr>

    <tr>
        <td>GH</td>
    </tr>

    <tr>
        <td colspan="2">N</td>
    </tr>

    <tr>
        <td colspan="4">O</td>
    </tr>

    <tr>
        <td colspan="6">P</td>
    </tr>

    <tr>
        <td colspan="8">Q</td>
    </tr>

    <tr>
        <td>R</td>
        <td>S</td>
        <td>T</td>
        <td>U</td>
        <td>V</td>
        <td>W</td>
        <td>X</td>
    </tr>

    <tr>
        <td colspan="12">Y</td>
    </tr>

    <tr>
        <td>Z</td>
        <td>1</td>
        <td>2</td>
        <td>3</td>
        <td>4</td>
        <td>5</td>
        <td>6</td>
        <td>7</td>
        <td>8</td>
        <td>9</td>
        <td>10</td>
    </tr>
</table>

</body>
</html>
