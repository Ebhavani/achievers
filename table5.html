<!DOCTYPE html>
<html>
<head>
    <title>Table 5</title>
    <style>
        table{
            border-collapse: collapse;
            margin: 20px auto;
        }

        td{
            border: 1px solid #999;
            text-align: center;
            font-size: 22px;
            width: 80px;
            height: 60px;
        }

        .yellow{background: yellow;}
        .blue{background: lightblue;}
        .green{background: lightgreen;}
        .cream{background: lightyellow;}
        .pink{background: #f7b6c2;}
        .red{background: salmon;}
        .orange{background: tomato;}
        .gold{background: gold;}
    </style>
</head>
<body>

<table>
    <tr>
        <td class="yellow">1</td>
        <td class="yellow" colspan="2">2</td>
        <td class="yellow" colspan="2">3</td>
    </tr>

    <tr>
        <td class="blue" rowspan="2" colspan="2">4</td>
        <td class="blue" colspan="3">5</td>
    </tr>

    <tr>
        <td class="green" colspan="2">6</td>
        <td class="green" rowspan="3">7</td>
    </tr>

    <tr>
        <td class="cream" rowspan="5">8</td>
        <td class="cream">9</td>
        <td class="cream">10</td>
        <td class="cream" rowspan="2">11</td>
    </tr>

    <tr>
        <td class="red" colspan="2">12</td>
    </tr>

    <tr>
        <td class="pink" rowspan="3">13</td>
        <td class="pink" colspan="3">14</td>
    </tr>

    <tr>
        <td class="orange" colspan="2">15</td>
        <td class="orange">16</td>
    </tr>

    <tr>
        <td class="gold" colspan="3">17</td>
    </tr>
</table>

</body>
</html>
