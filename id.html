<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Identification Card</title>
    <link rel="stylesheet" href="id_2.css">
</head>
<body>

    <div class="id-card">

        <div class="card-header">
            IDENTIFICATION CARD
        </div>

        <div class="card-body">

            <div class="photo">
                <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcS2vTJmiuZntl0gwG7hxX1hJbUIlOScs3g4sXLf4L51Tg&s=10" alt="Profile">
            </div>

            <div class="details">
                <table>
                    <tr>
                        <td class="label">Name:</td>
                        <td><strong>PRABHAS</strong></td>
                    </tr>
                    <tr>
                        <td class="label">Title:</td>
                        <td><strong>Director</strong></td>
                    </tr>
                    <tr>
                        <td class="label">ID No:</td>
                        <td><strong>123456</strong></td>
                    </tr>
                    <tr>
                        <td class="label">Issued:</td>
                        <td><strong>01/01/2020</strong></td>
                    </tr>
                    <tr>
                        <td class="label">Expires:</td>
                        <td><strong>31/12/2020</strong></td>
                    </tr>
                </table>

                <h1 class="company">COMPANY</h1>
            </div>

        </div>

    </div>

</body>
</html>
