<!DOCTYPE html>
<html>
<head>
    <title>Table with Colspan and Rowspan</title>
    <style>
        table{
            border-collapse: collapse;
            width: 700px;
            margin: 20px auto;
        }

        td{
            border: 2px solid black;
            text-align: center;
            font-size: 24px;
            padding: 20px;
        }

        .logo{background:#f3d1f5;}
        .topmenu{background:#fff9c4;}
        .sidemenu{background:#fff9c4;}
        .content{background:#e6f7fb;}
        .ads{background:#f3d1f5;}
        .footer{background:#dddddd;}
    </style>
</head>
<body>

<h2>Table with column and row spanned:</h2>

<table>
    <tr>
        <td class="logo">Logo</td>
        <td class="topmenu" colspan="3">Top Menu</td>
    </tr>

    <tr>
        <td class="sidemenu" rowspan="2">Side Menu</td>
        <td class="content">World News</td>
        <td class="content">Financial</td>
        <td class="ads" rowspan="2">List of Ads</td>
    </tr>

    <tr>
        <td class="content">Technology</td>
        <td class="content">Sports</td>
    </tr>

    <tr>
        <td class="footer" colspan="4">Footer</td>
    </tr>
</table>

</body>
</html>
